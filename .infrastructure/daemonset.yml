apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: todoapp-daemonset
  namespace: mateapp

spec:
  selector:
    matchLabels:
      app: todoapp-daemonset

  template:
    metadata:
      labels:
        app: todoapp-daemonset
    spec:
      containers:
      - name: busybox
        image: ikulyk404/busyboxplus:curl

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        command: ["/bin/sh", "-c"]
        args:
          - "while true; do curl -s http://todoapp-service.todoapp.svc.cluster.local/api/health; sleep 5; done"